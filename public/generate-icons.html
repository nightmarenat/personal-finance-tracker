<!DOCTYPE html>
<!--
  Open this file in a browser to generate PNG icons.
  Right-click each canvas → Save image as → save to public/icons/
  Save the 192x192 as icon-192.png and 512x512 as icon-512.png
-->
<html>
<body style="background:#111;display:flex;gap:20px;padding:20px;flex-wrap:wrap">
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>
  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;
      const r = s * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#7c3aed';
      ctx.fill();
      ctx.font = `${s * 0.5}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💎', s / 2, s / 2 + s * 0.03);
    }
    drawIcon(document.getElementById('c192'));
    drawIcon(document.getElementById('c512'));
  </script>
</body>
</html>
